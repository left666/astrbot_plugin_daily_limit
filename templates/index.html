<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Limit - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
/* === Design Tokens === */
:root {
    --color-primary: #2563EB;
    --color-primary-hover: #1D4ED8;
    --color-primary-light: #DBEAFE;
    --color-secondary: #3B82F6;
    --color-cta: #F97316;
    --color-cta-hover: #EA580C;
    --color-success: #16A34A;
    --color-success-light: #DCFCE7;
    --color-warning: #CA8A04;
    --color-warning-light: #FEF9C3;
    --color-danger: #DC2626;
    --color-danger-light: #FEE2E2;
    --color-info: #0EA5E9;
    --bg-body: #F1F5F9;
    --bg-surface: #FFFFFF;
    --bg-surface-hover: #F8FAFC;
    --bg-surface-raised: #FFFFFF;
    --bg-sidebar: #FFFFFF;
    --bg-input: #FFFFFF;
    --border-default: #E2E8F0;
    --border-strong: #CBD5E1;
    --border-focus: #2563EB;
    --text-primary: #1E293B;
    --text-secondary: #64748B;
    --text-tertiary: #94A3B8;
    --text-on-primary: #FFFFFF;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
    --font-sans: 'Fira Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'Fira Code', Consolas, monospace;
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --transition-fast: 150ms ease;
    --transition-base: 200ms ease;
    --transition-slow: 300ms ease;
    --sidebar-width: 240px;
    --sidebar-collapsed: 64px;
}

[data-theme="dark"] {
    --bg-body: #0F172A;
    --bg-surface: #1E293B;
    --bg-surface-hover: #334155;
    --bg-surface-raised: #334155;
    --bg-sidebar: #1E293B;
    --bg-input: #1E293B;
    --border-default: #334155;
    --border-strong: #475569;
    --border-focus: #3B82F6;
    --text-primary: #F1F5F9;
    --text-secondary: #94A3B8;
    --text-tertiary: #64748B;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.3);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.4);
    --color-primary-light: #1E3A5F;
    --color-success-light: #14532D;
    --color-warning-light: #713F12;
    --color-danger-light: #7F1D1D;
}

/* === Reset & Base === */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: var(--font-sans);
    background: var(--bg-body);
    color: var(--text-primary);
    min-height: 100vh;
    transition: background var(--transition-base), color var(--transition-base);
}
a { color: var(--color-primary); text-decoration: none; }

/* === Focus === */
:focus-visible {
    outline: 2px solid var(--color-primary);
    outline-offset: 2px;
}

/* === Layout === */
.app-layout {
    display: flex;
    min-height: 100vh;
}

/* === Sidebar === */
.sidebar {
    width: var(--sidebar-width);
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border-default);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    z-index: 100;
    transition: transform var(--transition-slow), background var(--transition-base), border-color var(--transition-base);
}

.sidebar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 20px 16px;
    border-bottom: 1px solid var(--border-default);
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--text-primary);
}

.sidebar-brand svg { width: 24px; height: 24px; color: var(--color-primary); flex-shrink: 0; }

.sidebar-nav {
    flex: 1;
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow-y: auto;
}

.nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: var(--radius-md);
    color: var(--text-secondary);
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-family: var(--font-sans);
    transition: background var(--transition-fast), color var(--transition-fast);
}

.nav-item:hover { background: var(--bg-surface-hover); color: var(--text-primary); }
.nav-item.active { background: var(--color-primary-light); color: var(--color-primary); font-weight: 600; }
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

.sidebar-footer {
    padding: 12px 8px;
    border-top: 1px solid var(--border-default);
    display: flex;
    flex-direction: column;
    gap: 2px;
}

/* === Mobile Header === */
.mobile-header {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 56px;
    background: var(--bg-sidebar);
    border-bottom: 1px solid var(--border-default);
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    z-index: 90;
    transition: background var(--transition-base), border-color var(--transition-base);
}

.mobile-header-left { display: flex; align-items: center; gap: 12px; }

.menu-btn, .mobile-action-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
    color: var(--text-secondary);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color var(--transition-fast), background var(--transition-fast);
}
.menu-btn:hover, .mobile-action-btn:hover { background: var(--bg-surface-hover); color: var(--text-primary); }
.menu-btn svg, .mobile-action-btn svg { width: 20px; height: 20px; }

.mobile-header-title { font-weight: 600; font-size: 1rem; color: var(--text-primary); }

/* === Sidebar Overlay === */
.sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 99;
}

.sidebar-overlay.active { display: block; }

/* === Main Content === */
.main-content {
    flex: 1;
    margin-left: var(--sidebar-width);
    padding: 24px;
    min-height: 100vh;
    transition: margin-left var(--transition-slow);
}

/* === Dashboard Sections === */
.dashboard-section { display: none; }
.dashboard-section.active { display: block; animation: fadeIn var(--transition-base); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
}

.section-header h2 {
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
}

.section-header h2 svg { width: 22px; height: 22px; color: var(--color-primary); }

.section-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

/* === Cards === */
.card {
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    padding: 20px;
    transition: background var(--transition-base), border-color var(--transition-base);
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
}

.stat-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    padding: 20px;
    transition: background var(--transition-base), border-color var(--transition-base), box-shadow var(--transition-fast);
}

.stat-card:hover { box-shadow: var(--shadow-md); }

.stat-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
}

.stat-card-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    border-radius: var(--radius-md);
    background: var(--color-primary-light);
    color: var(--color-primary);
}
.stat-card-icon svg { width: 20px; height: 20px; }

.stat-card-icon.green { background: var(--color-success-light); color: var(--color-success); }
.stat-card-icon.orange { background: #FFF7ED; color: var(--color-cta); }
.stat-card-icon.red { background: var(--color-danger-light); color: var(--color-danger); }
.stat-card-icon.blue { background: #EFF6FF; color: var(--color-info); }

.stat-card-value {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--text-primary);
    font-family: var(--font-mono);
    line-height: 1.2;
}

.stat-card-label {
    font-size: 0.8rem;
    color: var(--text-secondary);
    font-weight: 500;
    margin-top: 4px;
}

/* === Status Grid === */
.status-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
}

.status-summary {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
}

.status-item {
    text-align: center;
    padding: 14px 8px;
    border-radius: var(--radius-md);
    background: var(--bg-surface-hover);
    transition: background var(--transition-base);
}

.status-item-value {
    font-size: 1.4rem;
    font-weight: 700;
    font-family: var(--font-mono);
}

.status-item-label {
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-top: 2px;
    font-weight: 500;
}

/* === Trend Summary === */
.trend-summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 16px;
}

.trend-summary-card {
    padding: 14px;
    border-radius: var(--radius-md);
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-left: 3px solid var(--color-primary);
    transition: background var(--transition-base), border-color var(--transition-base);
}

.trend-summary-card h4 {
    font-size: 0.8rem;
    color: var(--text-secondary);
    font-weight: 600;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
}

.trend-summary-card p {
    font-size: 0.8rem;
    color: var(--text-primary);
    line-height: 1.6;
}

.trend-summary-card p strong { font-family: var(--font-mono); }

/* === Buttons === */
.btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border: none;
    border-radius: var(--radius-md);
    font-size: 0.8rem;
    font-weight: 600;
    font-family: var(--font-sans);
    cursor: pointer;
    transition: background var(--transition-fast), transform var(--transition-fast), box-shadow var(--transition-fast);
    white-space: nowrap;
}
.btn svg { width: 15px; height: 15px; }

.btn-primary { background: var(--color-primary); color: var(--text-on-primary); }
.btn-primary:hover { background: var(--color-primary-hover); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.btn-secondary { background: var(--bg-surface-hover); color: var(--text-secondary); border: 1px solid var(--border-default); }
.btn-secondary:hover { background: var(--border-default); color: var(--text-primary); }

.btn-cta { background: var(--color-cta); color: #FFFFFF; }
.btn-cta:hover { background: var(--color-cta-hover); transform: translateY(-1px); }

.btn-success { background: var(--color-success); color: #FFFFFF; }
.btn-success:hover { background: #15803D; }

.btn-danger { background: var(--color-danger); color: #FFFFFF; }
.btn-danger:hover { background: #B91C1C; }

.btn-icon {
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    color: var(--text-tertiary);
    border-radius: var(--radius-sm);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: color var(--transition-fast), background var(--transition-fast);
}
.btn-icon:hover { background: var(--bg-surface-hover); color: var(--text-primary); }
.btn-icon svg { width: 16px; height: 16px; }

/* === Inputs === */
.form-input, .form-select {
    padding: 8px 12px;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    background: var(--bg-input);
    color: var(--text-primary);
    font-size: 0.85rem;
    font-family: var(--font-sans);
    transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    outline: none;
}

.form-input:focus, .form-select:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

.form-select { cursor: pointer; padding-right: 30px; }

.search-input {
    position: relative;
    display: inline-flex;
    align-items: center;
}

.search-input svg {
    position: absolute;
    left: 10px;
    width: 15px;
    height: 15px;
    color: var(--text-tertiary);
    pointer-events: none;
}

.search-input input { padding-left: 32px; }

/* === Tables === */
.card-table { padding: 0; overflow: hidden; }
.card-table .table-scroll { overflow-x: auto; }

table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }

thead { background: var(--bg-surface-hover); }

th {
    padding: 12px 16px;
    text-align: left;
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    border-bottom: 1px solid var(--border-default);
    white-space: nowrap;
}

th.sortable { cursor: pointer; user-select: none; }
th.sortable:hover { color: var(--text-primary); }

td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-default);
    color: var(--text-primary);
}

tbody tr:hover { background: var(--bg-surface-hover); }
tbody tr:last-child td { border-bottom: none; }

.mono { font-family: var(--font-mono); font-size: 0.82rem; }

/* === Progress Bar === */
.progress-bar {
    width: 100%;
    height: 8px;
    background: var(--bg-surface-hover);
    border-radius: 4px;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width var(--transition-slow);
    background: var(--color-primary);
}

.progress-fill.warning { background: var(--color-warning); }
.progress-fill.danger { background: var(--color-danger); }
.progress-fill.success { background: var(--color-success); }

/* === Status Badge === */
.badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
}
.badge svg { width: 12px; height: 12px; }

.badge-success { background: var(--color-success-light); color: var(--color-success); }
.badge-warning { background: var(--color-warning-light); color: var(--color-warning); }
.badge-danger { background: var(--color-danger-light); color: var(--color-danger); }

/* === Section Info === */
.section-info {
    font-size: 0.8rem;
    color: var(--text-secondary);
    font-weight: 500;
}

/* === Config Grid === */
.config-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 14px;
}

.config-card {
    padding: 16px;
    border-radius: var(--radius-md);
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-left: 3px solid var(--color-primary);
    transition: background var(--transition-base), border-color var(--transition-base);
}

.config-card h4 {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
}

.config-card h4 svg { width: 16px; height: 16px; color: var(--color-primary); }

.config-card p {
    font-size: 0.82rem;
    color: var(--text-secondary);
    line-height: 1.6;
    word-break: break-all;
}

.config-card p strong { color: var(--text-primary); }

/* === Modal === */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    align-items: center;
    justify-content: center;
}

.modal.active { display: flex; }

.modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);
}

.modal-content {
    position: relative;
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    width: 90%;
    max-width: 560px;
    max-height: 80vh;
    overflow-y: auto;
    animation: modalIn var(--transition-base);
}

@keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(-10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px;
    border-bottom: 1px solid var(--border-default);
}

.modal-header h3 { font-size: 1.05rem; font-weight: 700; }

.modal-body { padding: 20px; }

.modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    padding: 16px 20px;
    border-top: 1px solid var(--border-default);
}

.form-group { margin-bottom: 16px; }
.form-group:last-child { margin-bottom: 0; }

.form-group label {
    display: block;
    margin-bottom: 6px;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-primary);
}

.form-textarea {
    width: 100%;
    min-height: 80px;
    padding: 10px 12px;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    background: var(--bg-input);
    color: var(--text-primary);
    font-size: 0.85rem;
    font-family: var(--font-mono);
    resize: vertical;
    transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    outline: none;
}

.form-textarea:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

/* === Toast === */
#toastContainer {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 300;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
}

.toast {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    border-radius: var(--radius-md);
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    box-shadow: var(--shadow-lg);
    font-size: 0.85rem;
    color: var(--text-primary);
    pointer-events: auto;
    transform: translateX(120%);
    transition: transform var(--transition-slow);
    max-width: 360px;
}

.toast.visible { transform: translateX(0); }
.toast svg { width: 16px; height: 16px; flex-shrink: 0; }
.toast-success svg { color: var(--color-success); }
.toast-error svg { color: var(--color-danger); }
.toast-info svg { color: var(--color-info); }

/* === Skeleton === */
.skeleton {
    background: linear-gradient(90deg, var(--bg-surface-hover) 25%, var(--bg-surface) 50%, var(--bg-surface-hover) 75%);
    background-size: 200% 100%;
    animation: skeleton-pulse 1.5s ease-in-out infinite;
    border-radius: var(--radius-md);
}

@keyframes skeleton-pulse {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

.skeleton-text { height: 14px; margin-bottom: 8px; }
.skeleton-text:last-child { margin-bottom: 0; width: 60%; }
.skeleton-card { height: 100px; }
.skeleton-chart { height: 280px; }

/* === Loading Spinner === */
.loading-spinner {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    color: var(--text-tertiary);
    font-size: 0.85rem;
    gap: 10px;
}

.loading-spinner svg {
    width: 24px;
    height: 24px;
    animation: spin 1s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* === Empty State === */
.empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    color: var(--text-tertiary);
    text-align: center;
    gap: 8px;
}

.empty-state svg { width: 40px; height: 40px; opacity: 0.5; }
.empty-state p { font-size: 0.85rem; }

/* === Responsive === */
@media (max-width: 1024px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .main-content { margin-left: 0; padding-top: 72px; }
    .mobile-header { display: flex; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .status-grid { grid-template-columns: 1fr; }
    .trend-summary-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 768px) {
    .main-content { padding: 16px; }
    .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .status-summary { grid-template-columns: repeat(2, 1fr); }
    .section-controls { width: 100%; }
    .section-header { flex-direction: column; align-items: flex-start; }
    .section-controls { justify-content: flex-start; }
    .trend-summary-grid { grid-template-columns: 1fr 1fr; }
    .config-grid { grid-template-columns: 1fr; }
}

@media (max-width: 480px) {
    .stats-grid { grid-template-columns: 1fr; }
    .status-summary { grid-template-columns: repeat(2, 1fr); }
    .trend-summary-grid { grid-template-columns: 1fr; }
    .modal-content { width: 95%; }
    .modal-footer { flex-direction: column; }
    .modal-footer .btn { width: 100%; justify-content: center; }
}

/* === Reduced Motion === */
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
    }
}

/* === Utility === */
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
.text-mono { font-family: var(--font-mono); }
.text-muted { color: var(--text-tertiary); }
.gap-2 { gap: 8px; }
.ml-auto { margin-left: auto; }
    </style>

function t(key) { return (I18N[lang] && I18N[lang][key]) || key; }

function applyI18N() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        el.textContent = t(key);
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        el.setAttribute('placeholder', t(key));
    });
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
}

function toggleLang() {
    lang = lang === 'zh' ? 'en' : 'zh';
    localStorage.setItem('lang', lang);
    applyI18N();
    updateLangToggle();
    updateThemeUI(document.documentElement.getAttribute('data-theme'));
}

function updateLangToggle() {
    const el = document.getElementById('sidebarLangLabel');
    if (el) el.textContent = lang === 'zh' ? 'English' : '中文';
}

function initLang() {
    lang = localStorage.getItem('lang') || 'zh';
    applyI18N();
    updateLangToggle();
}

// === Navigation ===
function switchSection(sectionId) {
    currentSection = sectionId;
    document.querySelectorAll('.dashboard-section').forEach(s => s.classList.remove('active'));
    document.getElementById('section-' + sectionId).classList.add('active');
    document.querySelectorAll('.nav-item[data-section]').forEach(n => {
        n.classList.toggle('active', n.dataset.section === sectionId);
    });
    closeSidebar();
}

// === Sidebar (Mobile) ===
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('active');
}

function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('active');
}

// === Theme ===
function initTheme() {
    const saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    updateThemeUI(saved);
}

function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateThemeUI(next);
    updateChartsTheme(next === 'dark');
}

function updateThemeUI(theme) {
    const isDark = theme === 'dark';
    const sunIcon = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
    const moonIcon = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
    const icon = isDark ? sunIcon : moonIcon;

    const sidebarIcon = document.getElementById('sidebarThemeIcon');
    const mobileIcon = document.getElementById('mobileThemeIcon');
    const sidebarLabel = document.getElementById('sidebarThemeLabel');
    if (sidebarIcon) sidebarIcon.innerHTML = icon;
    if (mobileIcon) mobileIcon.innerHTML = icon;
    if (sidebarLabel) sidebarLabel.textContent = isDark ? t('light_mode') : t('dark_mode');
}

// === Toast Notifications ===
function showToast(message, type = 'info', duration = 3500) {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    const iconMap = {
        success: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>',
        error: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>',
        info: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>'
    };
    toast.innerHTML = `${iconMap[type] || iconMap.info}<span>${message}</span>`;
    container.appendChild(toast);
    requestAnimationFrame(() => toast.classList.add('visible'));
    setTimeout(() => {
        toast.classList.remove('visible');
        toast.addEventListener('transitionend', () => toast.remove());
    }, duration);
}

// === Data Loading ===
async function loadData() {
    const btn = document.getElementById('refreshBtn');
    if (btn) { btn.disabled = true; btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px;animation:spin 1s linear infinite;"><path d="M21 12a9 9 0 11-6.219-8.56"></path></svg> ' + t('loading'); }
    try {
        await Promise.all([loadStats(), loadUsers(), loadGroups(), loadConfig(), loadStatusSummary()]);
    } catch (error) {
        showToast(t('toast_load_failed') + error.message, 'error');
    } finally {
        if (btn) { btn.disabled = false; btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg> ' + t('refresh'); }
    }
}

async function loadTrends() {
    try {
        const period = document.getElementById('trendPeriod').value;
        const response = await axios.get(`/api/trends?period=${period}`);
        if (response.data.success) {
            updateTrendChart(response.data.data);
        } else {
            throw new Error(response.data.error);
        }
    } catch (error) {
        showToast(t('toast_trends_failed') + error.message, 'error');
    }
}

async function loadStats() {
    const response = await axios.get('/api/stats');
    if (!response.data.success) throw new Error(response.data.error);
    const stats = response.data.data;
    const grid = document.getElementById('statsGrid');
    if (grid) {
        grid.innerHTML = `
            <div class="stat-card">
                <div class="stat-card-header"><div class="stat-card-icon blue"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg></div></div>
                <div class="stat-card-value">${stats.total_requests || 0}</div>
                <div class="stat-card-label">${t('stat_requests')}</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-header"><div class="stat-card-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg></div></div>
                <div class="stat-card-value">${stats.active_users || 0}</div>
                <div class="stat-card-label">${t('stat_users')}</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-header"><div class="stat-card-icon green"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></div></div>
                <div class="stat-card-value">${stats.active_groups || 0}</div>
                <div class="stat-card-label">${t('stat_groups')}</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-header"><div class="stat-card-icon orange"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></div></div>
                <div class="stat-card-value">${stats.date || '--'}</div>
                <div class="stat-card-label">${t('stat_date')}</div>
            </div>`;
    }
}

async function loadUsers() {
    const response = await axios.get('/api/users');
    if (!response.data.success) throw new Error(response.data.error);
    originalUsers = response.data.data;
    const total = originalUsers.length;
    const warning = originalUsers.filter(u => (u.usage_count / u.limit) * 100 > 70 && (u.usage_count / u.limit) * 100 <= 90).length;
    const danger = originalUsers.filter(u => (u.usage_count / u.limit) * 100 > 90).length;
    const info = document.getElementById('userInfo');
    if (info) info.textContent = `${t('info_total')}: ${total} | ${t('info_warning')}: ${warning} | ${t('info_danger')}: ${danger}`;
    filterUsers();
}

async function loadGroups() {
    const response = await axios.get('/api/groups');
    if (!response.data.success) throw new Error(response.data.error);
    originalGroups = response.data.data;
    const total = originalGroups.length;
    const warning = originalGroups.filter(g => (g.usage_count / g.limit) * 100 > 70 && (g.usage_count / g.limit) * 100 <= 90).length;
    const danger = originalGroups.filter(g => (g.usage_count / g.limit) * 100 > 90).length;

}

async function loadStatusSummary() {
    const [usersRes, groupsRes] = await Promise.all([axios.get('/api/users'), axios.get('/api/groups')]);
    if (!usersRes.data.success || !groupsRes.data.success) return;
    const users = usersRes.data.data, groups = groupsRes.data.data;
    const calcStatus = arr => {
        const n = arr.filter(x => (x.usage_count / x.limit) * 100 <= 70).length;
        const w = arr.filter(x => { const r = (x.usage_count / x.limit) * 100; return r > 70 && r <= 90; }).length;
        const d = arr.filter(x => (x.usage_count / x.limit) * 100 > 90).length;
        return { normal: n, warning: w, danger: d, total: arr.length };
    };
    const us = calcStatus(users), gs = calcStatus(groups);
    const el = document.getElementById('statusSummary');
    if (el) {
        el.innerHTML = `
            <div class="status-item"><div class="status-item-value" style="color:var(--color-success);">${us.normal}</div><div class="status-item-label">${t('label_normal_users')}</div></div>
            <div class="status-item"><div class="status-item-value" style="color:var(--color-warning);">${us.warning}</div><div class="status-item-label">${t('label_warning_users')}</div></div>
            <div class="status-item"><div class="status-item-value" style="color:var(--color-danger);">${us.danger}</div><div class="status-item-label">${t('label_danger_users')}</div></div>
            <div class="status-item"><div class="status-item-value" style="color:var(--color-success);">${gs.normal}</div><div class="status-item-label">${t('label_normal_groups')}</div></div>
            <div class="status-item"><div class="status-item-value" style="color:var(--color-warning);">${gs.warning}</div><div class="status-item-label">${t('label_warning_groups')}</div></div>
            <div class="status-item"><div class="status-item-value" style="color:var(--color-danger);">${gs.danger}</div><div class="status-item-label">${t('label_danger_groups')}</div></div>
            <div class="status-item"><div class="status-item-value">${us.total}</div><div class="status-item-label">${t('label_total_users')}</div></div>
            <div class="status-item"><div class="status-item-value">${gs.total}</div><div class="status-item-label">${t('label_total_groups')}</div></div>`;
    }
    updateUsageChart(users, groups);
}

// === Charts ===
function getChartColors() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    return {
        text: isDark ? '#F1F5F9' : '#1E293B',
        textSecondary: isDark ? '#94A3B8' : '#64748B',
        grid: isDark ? '#334155' : '#E2E8F0',
        tooltipBg: isDark ? '#1E293B' : '#FFFFFF',
        tooltipBorder: isDark ? '#475569' : '#E2E8F0'
    };
}

function updateUsageChart(users, groups) {
    const el = document.getElementById('usageChart');
    if (!el) return;
    const ctx = el.getContext('2d');
    if (usageChart) usageChart.destroy();
    const userRates = users.map(u => (u.usage_count / u.limit) * 100);
    const c = getChartColors();
    usageChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['0-30%', '30-70%', '70-90%', '90-100%'],
            datasets: [{
                data: [
                    userRates.filter(r => r <= 30).length,
                    userRates.filter(r => r > 30 && r <= 70).length,
                    userRates.filter(r => r > 70 && r <= 90).length,
                    userRates.filter(r => r > 90).length
                ],
                backgroundColor: ['#16A34A', '#0EA5E9', '#CA8A04', '#DC2626'],
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'bottom', labels: { color: c.text, font: { size: 12, family: "'Fira Sans', sans-serif" }, padding: 15, usePointStyle: true, pointStyleWidth: 8 } },
                title: { display: false }
            },
            cutout: '65%'
        }
    });
}

function updateTrendChart(trendsData) {
    const el = document.getElementById('trendChart');
    if (!el) return;
    const ctx = el.getContext('2d');
    if (trendChart) trendChart.destroy();
    const c = getChartColors();
    const chartType = document.getElementById('chartType').value;
    const dates = trendsData.data.map(i => i.date);
    const showTotal = document.getElementById('showTotalRequests').checked;
    const showUsers = document.getElementById('showActiveUsers').checked;
    const showGroups = document.getElementById('showActiveGroups').checked;
    const datasets = [];
    if (showTotal) datasets.push({ label: t('trend_total_requests'), data: trendsData.data.map(i => i.total_requests), borderColor: '#2563EB', backgroundColor: chartType === 'line' ? 'rgba(37,99,235,0.1)' : 'rgba(37,99,235,0.7)', borderWidth: 2, fill: chartType === 'line', tension: chartType === 'line' ? 0.4 : 0, pointRadius: chartType === 'line' ? 3 : 0, pointHoverRadius: 5 });
    if (showUsers) datasets.push({ label: t('trend_active_users'), data: trendsData.data.map(i => i.active_users), borderColor: '#F97316', backgroundColor: chartType === 'line' ? 'rgba(249,115,22,0.1)' : 'rgba(249,115,22,0.7)', borderWidth: 2, fill: chartType === 'line', tension: chartType === 'line' ? 0.4 : 0, pointRadius: chartType === 'line' ? 3 : 0, pointHoverRadius: 5 });
    if (showGroups) datasets.push({ label: t('trend_active_groups'), data: trendsData.data.map(i => i.active_groups), borderColor: '#16A34A', backgroundColor: chartType === 'line' ? 'rgba(22,163,74,0.1)' : 'rgba(22,163,74,0.7)', borderWidth: 2, fill: chartType === 'line', tension: chartType === 'line' ? 0.4 : 0, pointRadius: chartType === 'line' ? 3 : 0, pointHoverRadius: 5 });
    const periodLabels = { day: t('period_label_day'), week: t('period_label_week'), month: t('period_label_month') };
    trendChart = new Chart(ctx, {
        type: chartType,
        data: { labels: dates, datasets },
        options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { position: 'top', labels: { color: c.text, font: { size: 12, family: "'Fira Sans', sans-serif" }, padding: 15, usePointStyle: true, pointStyleWidth: 8 } },
                title: { display: true, text: t('chart_title').replace('{period}', periodLabels[trendsData.period] || t('nav_trends')), color: c.text, font: { size: 14, weight: 'bold', family: "'Fira Sans', sans-serif" }, padding: { bottom: 16 } },
                tooltip: { mode: 'index', intersect: false, backgroundColor: c.tooltipBg, titleColor: c.text, bodyColor: c.textSecondary, borderColor: c.tooltipBorder, borderWidth: 1, cornerRadius: 8, padding: 10 }
            },
            scales: {
                x: { grid: { color: c.grid, borderDash: [4, 4] }, ticks: { color: c.textSecondary, font: { size: 11 }, maxRotation: 45 } },
                y: { grid: { color: c.grid, borderDash: [4, 4] }, ticks: { color: c.textSecondary, font: { size: 11 } }, beginAtZero: true }
            },
            animation: { duration: 600, easing: 'easeOutQuart' }
        }
    });
    if (trendsData.summary) updateTrendSummary(trendsData);
}

    if (!el || !trendsData.summary) { if (el) el.innerHTML = ''; return; }
    const s = trendsData.summary;
    el.innerHTML = `
        <div class="trend-summary-card" style="border-left-color:var(--color-primary);"><h4>${t('trend_total_requests')}</h4><p>${t('trend_avg')}: <strong>${s.total_requests.average}</strong><br>${t('trend_peak')}: <strong>${s.total_requests.peak}</strong><br>${t('trend_min')}: <strong>${s.total_requests.min}</strong><br>${t('trend_total')}: <strong>${s.total_requests.total}</strong></p></div>

        <div class="trend-summary-card" style="border-left-color:var(--color-success);"><h4>${t('trend_active_groups')}</h4><p>${t('trend_avg')}: <strong>${s.active_groups.average}</strong><br>${t('trend_peak')}: <strong>${s.active_groups.peak}</strong><br>${t('trend_min')}: <strong>${s.active_groups.min}</strong><br>${t('trend_total')}: <strong>${s.active_groups.total}</strong></p></div>

}

function updateChartsTheme(isDark) {
    // Charts will be re-rendered on next data load if needed
    // For immediate theme update, we update existing charts
    if (usageChart) {
        const c = getChartColors();
        usageChart.options.plugins.legend.labels.color = c.text;
        usageChart.update();
    }
    if (trendChart) {
        const c = getChartColors();
        trendChart.options.plugins.legend.labels.color = c.text;
        trendChart.options.plugins.title.color = c.text;
        trendChart.options.scales.x.ticks.color = c.textSecondary;
        trendChart.options.scales.y.ticks.color = c.textSecondary;
        trendChart.options.scales.x.grid.color = c.grid;
        trendChart.options.scales.y.grid.color = c.grid;
        trendChart.update();
    }
}

        const rate = (u.usage_count / u.limit) * 100;
        const cls = rate > 90 ? 'danger' : rate > 70 ? 'warning' : 'success';
        const badge = rate > 90 ? 'badge-danger' : rate > 70 ? 'badge-warning' : 'badge-success';
        const label = rate > 90 ? t('danger') : rate > 70 ? t('warning') : t('normal');

// === Filter & Sort ===
function filterUsers() {
    const filter = document.getElementById('userFilter').value.toLowerCase();
    const statusF = document.getElementById('userStatusFilter').value;
    const usageF = document.getElementById('userUsageFilter').value;
    let filtered = [...originalUsers];
    if (filter) filtered = filtered.filter(u => u.user_id.toLowerCase().includes(filter));
    if (statusF !== 'all') filtered = filtered.filter(u => { const r = (u.usage_count / u.limit) * 100; return statusF === 'normal' ? r <= 70 : statusF === 'warning' ? r > 70 && r <= 90 : r > 90; });
    if (usageF !== 'all') { const [min, max] = usageF.split('-').map(Number); filtered = filtered.filter(u => { const r = (u.usage_count / u.limit) * 100; return r >= min && r <= max; }); }
    renderUsersTable(filtered);
}

function filterGroups() {
    const filter = document.getElementById('groupFilter').value.toLowerCase();
    const statusF = document.getElementById('groupStatusFilter').value;
    const modeF = document.getElementById('groupModeFilter').value;
    const usageF = document.getElementById('groupUsageFilter').value;
    let filtered = [...originalGroups];
    if (filter) filtered = filtered.filter(g => g.group_id.toLowerCase().includes(filter));
    if (statusF !== 'all') filtered = filtered.filter(g => { const r = (g.usage_count / g.limit) * 100; return statusF === 'normal' ? r <= 70 : statusF === 'warning' ? r > 70 && r <= 90 : r > 90; });
    if (modeF !== 'all') filtered = filtered.filter(g => g.mode === modeF);
    if (usageF !== 'all') { const [min, max] = usageF.split('-').map(Number); filtered = filtered.filter(g => { const r = (g.usage_count / g.limit) * 100; return r >= min && r <= max; }); }
    renderGroupsTable(filtered);
}

function resetUserFilters() {
    document.getElementById('userFilter').value = '';
    document.getElementById('userStatusFilter').value = 'all';
    document.getElementById('userUsageFilter').value = 'all';
    filterUsers();
}

function resetGroupFilters() {
    document.getElementById('groupFilter').value = '';
    document.getElementById('groupStatusFilter').value = 'all';
    document.getElementById('groupModeFilter').value = 'all';
    document.getElementById('groupUsageFilter').value = 'all';
    filterGroups();
}

function sortTable(tableId, colIndex) {
    const table = document.getElementById(tableId);
    const tbody = table.querySelector('tbody');
    const rows = Array.from(tbody.querySelectorAll('tr'));
    const isAsc = table.dataset.sortCol == colIndex && table.dataset.sortDir === 'asc';
    const dir = isAsc ? 'desc' : 'asc';
    table.dataset.sortCol = colIndex;
    table.dataset.sortDir = dir;
    table.querySelectorAll('.sort-indicator').forEach((ind, i) => {
        ind.textContent = i === colIndex ? (dir === 'asc' ? ' \u2191' : ' \u2193') : '';
    });
    rows.sort((a, b) => {
        const aV = a.cells[colIndex].textContent.trim();
        const bV = b.cells[colIndex].textContent.trim();
        const aN = parseFloat(aV), bN = parseFloat(bV);
        if (!isNaN(aN) && !isNaN(bN)) return dir === 'asc' ? aN - bN : bN - aN;
        return dir === 'asc' ? aV.localeCompare(bV) : bV.localeCompare(aV);
    });
    rows.forEach(r => tbody.appendChild(r));
}

// === Config Editor ===
let currentConfig = null;

function openConfigEditor() {
    loadConfigToForm().then(() => {
        document.getElementById('configModal').classList.add('active');
        document.addEventListener('keydown', handleEscKey);
    }).catch(err => showToast(t('toast_config_failed') + err.message, 'error'));
}

function closeConfigEditor() {
    document.getElementById('configModal').classList.remove('active');
    document.removeEventListener('keydown', handleEscKey);
}

function handleEscKey(e) { if (e.key === 'Escape') closeConfigEditor(); }

async function loadConfigToForm() {
    const res = await axios.get('/api/config');
    if (!res.data.success) throw new Error(res.data.error);
    currentConfig = res.data.data;
    document.getElementById('defaultDailyLimit').value = currentConfig.default_daily_limit;
    document.getElementById('priorityMultiplier').value = currentConfig.priority_multiplier || 2;
    document.getElementById('exemptUsers').value = currentConfig.exempt_users.join('\n');
    document.getElementById('priorityUsers').value = currentConfig.priority_users ? currentConfig.priority_users.join('\n') : '';
    document.getElementById('groupLimits').value = currentConfig.group_limits;
    document.getElementById('userLimits').value = currentConfig.user_limits;
    document.getElementById('skipPatterns').value = currentConfig.skip_patterns.join('\n');
    document.getElementById('resetTime').value = currentConfig.reset_time || '00:00';
}

async function saveConfig() {
    try {
        const data = {
            default_daily_limit: parseInt(document.getElementById('defaultDailyLimit').value),
            priority_multiplier: parseFloat(document.getElementById('priorityMultiplier').value),
            exempt_users: document.getElementById('exemptUsers').value.split('\n').map(l => l.trim()).filter(l => l),
            priority_users: document.getElementById('priorityUsers').value.split('\n').map(l => l.trim()).filter(l => l),
            group_limits: document.getElementById('groupLimits').value,
            user_limits: document.getElementById('userLimits').value,
            skip_patterns: document.getElementById('skipPatterns').value.split('\n').map(l => l.trim()).filter(l => l),
            reset_time: document.getElementById('resetTime').value
        };
        if (data.default_daily_limit < 1 || data.default_daily_limit > 1000) throw new Error(t('validation_limit_range'));
        if (data.priority_multiplier < 1 || data.priority_multiplier > 10) throw new Error(t('validation_multiplier_range'));
        const validateIds = (ids, name) => { for (const id of ids) { if (!/^\d+$/.test(id)) throw new Error(t('validation_invalid_id').replace('{name}', name).replace('{id}', id)); } };
        validateIds(data.exempt_users, 'Exempt users');
        validateIds(data.priority_users, 'Priority users');
        const res = await axios.post('/api/config', data);
        if (!res.data.success) throw new Error(res.data.error);
        closeConfigEditor();
        await loadConfig();
        showToast(t('toast_config_saved'), 'success');
    } catch (error) {
        showToast(t('toast_save_failed') + error.message, 'error');
    }
}

// === Export ===
function exportToCSV(type) {
    const tbodyId = type === 'users' ? 'usersTableBody' : 'groupsTableBody';
    const headers = type === 'users' ? [t('col_user_id'), t('col_used'), t('col_limit'), t('col_remaining'), t('col_usage'), t('col_status')] : [t('col_group_id'), t('col_used'), t('col_limit'), t('col_remaining'), t('col_mode'), t('col_usage'), t('col_status')];
    const filename = `${type}_${new Date().toISOString().slice(0, 10)}.csv`;
    const rows = Array.from(document.getElementById(tbodyId).querySelectorAll('tr')).filter(r => r.cells.length > 1);
    const data = [headers.map(h => `"${h}"`)];
    rows.forEach(r => {
        data.push(Array.from(r.cells).map(c => `"${c.textContent.trim().replace(/"/g, '""')}"`).join(','));
    });
    const blob = new Blob([data.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.style.display = 'none';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    showToast(t('toast_export_success').replace('{type}', type), 'success');
}

function exportTrendData() {
    if (!trendChart) return;
    const { labels, datasets } = trendChart.data;
    let csv = t('col_date');
    datasets.forEach(d => csv += `,${d.label}`);
    csv += '\n';
    labels.forEach((l, i) => {
        csv += l;
        datasets.forEach(d => csv += `,${d.data[i] || 0}`);
        csv += '\n';
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `trends_${new Date().toISOString().split('T')[0]}.csv`;
    link.style.display = 'none';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    showToast(t('toast_export_success').replace('{type}', 'Trend'), 'success');
}

// === Logout ===
function logout() {
    if (confirm(t('confirm_logout'))) window.location.href = '/logout';
}

// === Init ===
document.addEventListener('DOMContentLoaded', function() {
    initTheme();
    initLang();
    Promise.all([loadData(), loadTrends()]).catch(err => showToast(t('initial_load_failed') + err.message, 'error'));
    refreshInterval = setInterval(loadData, 30000);
});
    </script>
